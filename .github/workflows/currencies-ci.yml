name: CI Currencies Service

on:
  pull_request:
    branches: ["main"]
    paths:
      - "services/currencies-service/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and Test
        working-directory: ./services/currencies-service
        run: mvn clean test
