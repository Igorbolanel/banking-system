name: Frontend CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: "web/**/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: build
        run: npm run build
