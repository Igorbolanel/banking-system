name: Deploy Frontend to Production

on:
  push:
    tags:
      - "web-v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/banking-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./web
          push: true
          build-args: |
            VITE_CORE_API_URL=${{ secrets.PROD_CORE_API_URL }}
            VITE_CURRENCIES_API_URL=${{ secrets.PROD_CURRENCIES_API_URL }}
            VITE_INFO_API_URL=${{ secrets.PROD_INFO_API_URL }}
            VITE_ASSISTANT_API_URL=${{ secrets.PROD_ASSISTANT_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            if [ ! -d ~/banking-system ]; then
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ~/banking-system
              cd ~/banking-system
            else
              cd ~/banking-system
              git pull origin main
            fi
            cd ~/banking-system/infra/docker-compose
            git pull origin main

            if ! grep -q "^GITHUB_REPOSITORY_OWNER=" .env.versions; then
              echo "GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}" >> .env.versions
            fi

            if grep -q "^WEB_VERSION=" .env.versions; then
              sed -i "s/^WEB_VERSION=.*/WEB_VERSION=${{ github.ref_name }}/" .env.versions
            else
              echo "WEB_VERSION=${{ github.ref_name }}" >> .env.versions
            fi

            docker compose --env-file .env.versions pull banking-frontend
            docker compose --env-file .env.versions up -d banking-frontend
